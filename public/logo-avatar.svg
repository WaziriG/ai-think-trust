<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <title>AI Think Trust - Square Avatar</title>
  <desc>Square social avatar version for LinkedIn, Instagram, and other platforms. ATT monogram with coral accent.</desc>

  <!-- Background -->
  <rect x="0" y="0" width="500" height="500" fill="#0A0A0A"/>

  <!-- ATT monogram -->
  <text x="250" y="290" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="160" font-weight="900" fill="#FAFAF8" letter-spacing="-6">ATT</text>

  <!-- Accent dot (top right, clear of letters) -->
  <circle cx="410" cy="130" r="22" fill="#D84A3D"/>

  <!-- Tagline at bottom -->
  <text x="250" y="400" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="16" font-weight="500" fill="#FAFAF8" letter-spacing="6">AI THINK TRUST</text>
  <text x="250" y="430" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="500" fill="#D84A3D" letter-spacing="4">THE TRUSTED VOICES IN AI</text>
</svg>
